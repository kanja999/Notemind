<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "NoteMind",
  short_name: "NoteMind",
  description: "Aplikasi catatan cerdas",
  start_url: "./",
  display: "standalone",
  background_color: "#faf8f3",
  theme_color: "#3d2b1f",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%233d2b1f'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%235a7c5a'%3E◈%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%233d2b1f'/%3E%3Ctext x='256' y='350' font-size='280' text-anchor='middle' fill='%235a7c5a'%3E◈%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.write(`<link rel="manifest" href="${manifestURL}">`);
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

<body>

<div id="install-banner">
  <span>📲 Install NoteMind ke homescreen!</span>
  <button onclick="installPWA()" style="background:#fff;color:var(--green);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-family:var(--mono);cursor:pointer;font-weight:600;">Install</button>
  <button onclick="document.getElementById('install-banner').classList.remove('show')" style="background:transparent;color:#fff;border:none;font-size:18px;cursor:pointer;padding:0 4px;">×</button>
</div>

<div id="app"></div>
<div id="toast"></div>

<script>
// ─── PWA Service Worker ────────────────────────────────────────────────────────
const SW_CODE = `
const CACHE = 'notemind-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./'))));
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ─── PWA Install ──────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
window.installPWA = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') showToast('NoteMind berhasil diinstall! 🎉');
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
};

// ─── Storage ──────────────────────────────────────────────────────────────────
const DB = {
  get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// ─── State ────────────────────────────────────────────────────────────────────
let notes = DB.get('notemind_notes') || getSampleNotes();
let currentView = 'home';
let activeNote = null;
let editState = {};
let searchQuery = '';
let activeTag = null;
let activeFolder = null;
let previewMode = false;
let graphAnimId = null;
let graphNodes = [];

function getSampleNotes() {
  return [
    {
      id: '1', title: 'Selamat Datang di NoteMind 🌿',
      content: '# NoteMind\n\nAplikasi catatan cerdas yang menghubungkan ide-idemu.\n\n## Fitur Utama\n- **Linked Notes** — hubungkan dengan [[sintaks ini]]\n- **Tags & Folder** — kategorikan catatanmu\n- **Graph View** — lihat koneksi visual\n- **Daily Journal** — catat harianmu\n\n> Mulai dengan membuat catatan baru!',
      tags: ['panduan'], pinned: true, folder: 'Panduan',
      created: Date.now() - 86400000 * 3, updated: Date.now() - 3600000, links: ['Ide Kreatif']
    },
    {
      id: '2', title: 'Ide Kreatif',
      content: '# Ide Kreatif\n\nKumpulan ide-ide yang menginspirasi.\n\n## Referensi\n[[Selamat Datang di NoteMind 🌿]] adalah panduan yang bagus.\n\n## Catatan\n- Selalu catat ide yang muncul\n- Hubungkan dengan catatan lain',
      tags: ['ide', 'kreatif'], pinned: false, folder: 'Proyek',
      created: Date.now() - 86400000 * 2, updated: Date.now() - 7200000, links: ['Selamat Datang di NoteMind 🌿']
    },
    {
      id: '3', title: 'Journal — Hari Pertama',
      content: '# Jurnal Harian\n\n## Refleksi\nHari yang produktif! Mencoba NoteMind untuk pertama kali.\n\n## Rencana Besok\n- Buat lebih banyak catatan\n- Coba Graph View\n- Hubungkan catatan satu sama lain',
      tags: ['jurnal', 'harian'], pinned: false, folder: 'Jurnal',
      created: Date.now() - 3600000, updated: Date.now() - 1800000, links: []
    }
  ];
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function saveNotes() { DB.set('notemind_notes', notes); }

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = '', 2500);
}

function formatDate(ts) {
  const d = new Date(ts), now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'Baru saja';
  if (diff < 3600) return Math.floor(diff / 60) + ' mnt lalu';
  if (diff < 86400) return Math.floor(diff / 3600) + ' jam lalu';
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>')
    .replace(/\[\[(.+?)\]\]/g,'<span class="backlink" data-link="$1">◈ $1</span>')
    .replace(/\n/g,'<br>');
}

function extractLinks(content) {
  return [...content.matchAll(/\[\[(.+?)\]\]/g)].map(m => m[1]);
}

function getAllTags() {
  const t = {};
  notes.forEach(n => (n.tags||[]).forEach(tag => t[tag] = (t[tag]||0)+1));
  return t;
}
function getAllFolders() {
  const f = {};
  notes.forEach(n => { if (n.folder) f[n.folder] = (f[n.folder]||0)+1; });
  return f;
}

function getFilteredNotes() {
  let list = [...notes];
  if (activeTag) list = list.filter(n => (n.tags||[]).includes(activeTag));
  if (activeFolder) list = list.filter(n => n.folder === activeFolder);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q) || (n.tags||[]).some(t=>t.includes(q)));
  }
  return list.sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.updated-a.updated);
}

// ─── SVG Icons ────────────────────────────────────────────────────────────────

// ─── Graph View ────────────────────────────────────────────────────────────────
function initGraph() {
  const canvas = document.getElementById('graph-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.clientWidth * window.devicePixelRatio;
  const H = canvas.clientHeight * window.devicePixelRatio;
  canvas.width = W; canvas.height = H;
  const scale = window.devicePixelRatio;

  graphNodes = notes.map((n, i) => ({
    id: n.id, title: n.title,
    x: (W / scale) / 2 + Math.cos(i / notes.length * Math.PI * 2) * 110,
    y: (H / scale) / 2 + Math.sin(i / notes.length * Math.PI * 2) * 110,
    vx: 0, vy: 0, links: n.links || [], tags: n.tags || []
  }));

  if (graphAnimId) cancelAnimationFrame(graphAnimId);

  function draw() {
    const ns = graphNodes;
    const cw = W / scale, ch = H / scale;
    for (let i = 0; i < ns.length; i++) {
      for (let j = i + 1; j < ns.length; j++) {
        const dx = ns[j].x - ns[i].x, dy = ns[j].y - ns[i].y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const f = 900 / (d * d);
        ns[i].vx -= dx/d*f; ns[i].vy -= dy/d*f;
        ns[j].vx += dx/d*f; ns[j].vy += dy/d*f;
      }
      ns[i].links.forEach(lname => {
        const t = ns.find(n => n.title === lname); if (!t) return;
        const dx = t.x - ns[i].x, dy = t.y - ns[i].y;
        const d = Math.sqrt(dx*dx+dy*dy)||1;
        const f = (d-100)*0.04;
        ns[i].vx += dx/d*f; ns[i].vy += dy/d*f;
        t.vx -= dx/d*f; t.vy -= dy/d*f;
      });
      ns[i].vx += (cw/2 - ns[i].x) * 0.006;
      ns[i].vy += (ch/2 - ns[i].y) * 0.006;
      ns[i].vx *= 0.82; ns[i].vy *= 0.82;
      ns[i].x = Math.max(28, Math.min(cw-28, ns[i].x + ns[i].vx));
      ns[i].y = Math.max(28, Math.min(ch-28, ns[i].y + ns[i].vy));
    }

    ctx.save();
    ctx.scale(scale, scale);
    ctx.clearRect(0, 0, cw, ch);
    ctx.fillStyle = '#f3efe6';
    ctx.fillRect(0, 0, cw, ch);

    // Edges
    ns.forEach(n => {
      n.links.forEach(lname => {
        const t = ns.find(x => x.title === lname); if (!t) return;
        ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(t.x, t.y);
        ctx.strokeStyle = '#c8b89a'; ctx.lineWidth = 1.5; ctx.stroke();
      });
    });

    // Nodes
    ns.forEach(n => {
      const r = 16;
      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
      ctx.fillStyle = '#5a7c5a'; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.fillStyle = '#3d2b1f';
      ctx.font = `10px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      const label = n.title.length > 11 ? n.title.slice(0,11)+'…' : n.title;
      ctx.fillText(label, n.x, n.y + r + 13);
    });

    ctx.restore();
    graphAnimId = requestAnimationFrame(draw);
  }
  graphAnimId = requestAnimationFrame(draw);

  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left), y = (e.clientY - rect.top);
    const hit = graphNodes.find(n => Math.hypot(n.x-x, n.y-y) < 20);
    if (hit) { const note = notes.find(n => n.id===hit.id); if (note) openNote(note); }
  };
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function openNote(note) {
  if (graphAnimId) { cancelAnimationFrame(graphAnimId); graphAnimId = null; }
  activeNote = note; currentView = 'note'; render();
}

function newNote() {
  activeNote = null;
  editState = { title: 'Catatan Baru', content: '# Catatan Baru\n\n', tags: '', folder: '' };
  previewMode = false; currentView = 'edit'; render();
}

function newJournal() {
  const today = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  activeNote = null;
  editState = {
    title: `Jurnal — ${today}`,
    content: `# Jurnal ${today}\n\n## 🌤 Bagaimana hariku?\n\n## 🙏 Yang aku syukuri\n- \n\n## 📋 Rencana besok\n- \n\n## 💭 Catatan bebas\n`,
    tags: 'jurnal,harian', folder: 'Jurnal'
  };
  previewMode = false; currentView = 'edit'; render();
}

function editNote(note) {
  activeNote = note;
  editState = { title: note.title, content: note.content, tags: (note.tags||[]).join(','), folder: note.folder||'' };
  previewMode = false; currentView = 'edit'; render();
}

function saveNote() {
  const tags = editState.tags.split(',').map(t=>t.trim()).filter(Boolean);
  const links = extractLinks(editState.content);
  if (activeNote) {
    notes = notes.map(n => n.id===activeNote.id
      ? {...n, title:editState.title, content:editState.content, tags, folder:editState.folder, updated:Date.now(), links}
      : n);
    activeNote = notes.find(n=>n.id===activeNote.id);
  } else {
    const n = { id: Date.now().toString(), title:editState.title, content:editState.content, tags, folder:editState.folder, pinned:false, created:Date.now(), updated:Date.now(), links };
    notes = [...notes, n];
  }
  saveNotes(); showToast('Catatan disimpan ✓');
  currentView = 'home'; render();
}

function deleteNote(id) {
  if (!confirm('Hapus catatan ini?')) return;
  notes = notes.filter(n => n.id!==id);
  saveNotes(); showToast('Catatan dihapus', 'error');
  currentView = 'home'; render();
}

function togglePin(id) {
  notes = notes.map(n => n.id===id ? {...n, pinned:!n.pinned} : n);
  saveNotes();
  if (activeNote && activeNote.id===id) activeNote = notes.find(n=>n.id===id);
  render();
}

function insertMarkdown(prefix, suffix='') {
  const ta = document.getElementById('note-textarea');
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const selected = ta.value.slice(start, end);
  const newText = ta.value.slice(0,start) + prefix + selected + suffix + ta.value.slice(end);
  editState.content = newText;
  ta.value = newText;
  ta.focus();
  ta.setSelectionRange(start+prefix.length, end+prefix.length);
}

function exportNotes() {
  const blob = new Blob([JSON.stringify(notes,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `notemind_${Date.now()}.json`;
  a.click(); showToast('Ekspor berhasil ✓');
}

function importNotes(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        const ids = new Set(notes.map(n=>n.id));
        notes = [...notes, ...data.filter(n=>!ids.has(n.id))];
        saveNotes(); showToast(`${data.length} catatan diimpor ✓`);
        render();
      }
    } catch { showToast('Format tidak valid', 'error'); }
  };
  reader.readAsText(file);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = buildUI();
  bindEvents();
  if (currentView === 'graph') setTimeout(initGraph, 50);
}

function noteCard(note) {
  const preview = note.content.replace(/[#*`\[\]>]/g,'').slice(0,75) + '...';
  return `
  <div class="card ${note.pinned?'pinned':''} fade-in" onclick="openNote(notes.find(n=>n.id==='${note.id}'))">
    ${note.pinned ? `<div class="pin-badge">${icons.pinFill}</div>` : ''}
    <div class="card-title">${note.title}</div>
    <div class="card-preview">${preview}</div>
    <div class="card-meta">
      ${note.folder ? `<span class="folder-chip">${note.folder}</span>` : ''}
      ${(note.tags||[]).slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('')}
      <span class="date-text">${formatDate(note.updated)}</span>
    </div>
  </div>`;
}

        <div class="stat-item"><div class="stat-num">${notes.length}</div><div class="stat-label">Catatan</div></div>
        <div class="stat-item"><div class="stat-num">${Object.keys(tags).length}</div><div class="stat-label">Tags</div></div>
        <div class="stat-item"><div class="stat-num">${Object.keys(getAllFolders()).length}</div><div class="stat-label">Folder</div></div>
        <div class="stat-item"><div class="stat-num">${notes.filter(n=>n.pinned).length}</div><div class="stat-label">Pinned</div></div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-btn" onclick="newJournal()">📔 Jurnal Baru</button>
        <button class="quick-btn" onclick="cancelAnimationFrame(graphAnimId);currentView='graph';render()">📊 Graph View</button>
        <button class="quick-btn" onclick="currentView='tags';render()">🏷️ Tags</button>
        <button class="quick-btn" onclick="currentView='folders';render()">📁 Folder</button>
      </div>
      ` : `
      <!-- Filter Active -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <button class="btn-outline btn-sm" onclick="activeTag=null;activeFolder=null;searchQuery='';render()">
          ${icons.close} Hapus filter
        </button>
        ${activeTag ? `<span class="tag" style="font-size:12px">#${activeTag}</span>` : ''}
        ${activeFolder ? `<span class="folder-chip" style="font-size:12px">📁 ${activeFolder}</span>` : ''}
        ${searchQuery ? `<span class="tag" style="font-size:12px">🔍 "${searchQuery}"</span>` : ''}
      </div>
      `}

      <!-- Pinned -->
      ${pinned.length > 0 ? `
      <div class="section-title">📌 Disematkan</div>
      ${pinned.map(noteCard).join('')}
      ` : ''}

      <!-- Recent -->
      <div class="section-title">
        ${searchQuery || activeTag || activeFolder ? `Hasil (${filtered.length})` : '📝 Terbaru'}
      </div>
      ${recent.length === 0 && pinned.length === 0 ? `
      <div class="empty-state slide-up">
        <div class="emoji">🌿</div>
        <h3>Belum ada catatan</h3>
        <p>Tekan tombol + untuk mulai menulis</p>
      </div>
      ` : recent.map(noteCard).join('')}
    </div>

    <!-- FAB -->
    <button class="fab" onclick="newNote()">${icons.plus}</button>

    ${buildNavBar()}
  </div>`;
}

function buildHeader(title) {
  return `
  <div class="header">
    <div class="logo"><span class="logo-mark">◈</span> ${title}</div>
    <button class="btn-outline btn-sm" onclick="currentView='home';render()">${icons.back} Kembali</button>
  </div>`;
}

function buildNavBar() {
  const items = [
    { icon: 'note', label: 'Catatan', view: 'home' },
    { icon: 'tag', label: 'Tags', view: 'tags' },
    { icon: 'folder', label: 'Folder', view: 'folders' },
    { icon: 'graph', label: 'Graph', view: 'graph' },
    { icon: 'journal', label: 'Jurnal', view: 'journal' },
  ];
  return `<div class="nav-bar">
    ${items.map(item => `
    <button class="nav-item ${currentView===item.view||(!['tags','folders','graph','journal'].includes(currentView)&&item.view==='home')?'active':''}"
      onclick="${item.view==='graph'?`cancelAnimationFrame(graphAnimId);currentView='graph';render()`
              :item.view==='journal'?'newJournal()'
              :`currentView='${item.view}';render()`}">
      ${icons[item.icon]}
      <span>${item.label}</span>
    </button>`).join('')}
  </div>`;
}

function bindEvents() {
  // Sync edit inputs
  const titleEl = document.getElementById('edit-title');
  if (titleEl) titleEl.oninput = e => editState.title = e.target.value;

  const folderEl = document.getElementById('edit-folder');
  if (folderEl) folderEl.oninput = e => editState.folder = e.target.value;

  const tagsEl = document.getElementById('edit-tags');
  if (tagsEl) tagsEl.oninput = e => editState.tags = e.target.value;

  const textareaEl = document.getElementById('note-textarea');
  if (textareaEl) textareaEl.oninput = e => editState.content = e.target.value;

  // Backlinks in note view
  const noteContent = document.getElementById('note-content');
  if (noteContent) {
    noteContent.onclick = e => {
      const link = e.target.closest('[data-link]');
      if (link) {
        const name = link.dataset.link;
        const found = notes.find(n=>n.title===name);
        if (found) openNote(found);
      }
    };
  }

  // Restore search focus
  const searchEl = document.getElementById('search-input');
  if (searchEl && document.activeElement !== searchEl && searchQuery) {
    // Don't steal focus
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
