@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

/* Sync indicator */

<body>
<div id="app"></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, where, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ─── Firebase Config ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAj6fs4QNc7G4M8i8Fz3CwkTHIS_IS_PLACEHOLDER",
  authDomain: "noteminda.firebaseapp.com",
  projectId: "noteminda",
  storageBucket: "noteminda.appspot.com",
  messagingSenderId: "705895134394",
  appId: "1:705895134394:web:6d966e73cf_PLACEHOLDER",
  measurementId: "G-EPTVBLY3RV"
};

const fireApp = initializeApp(firebaseConfig);
const auth = getAuth(fireApp);
const db = getFirestore(fireApp);
const provider = new GoogleAuthProvider();

// ─── State ────────────────────────────────────────────────────────────────────
let currentUser = null;
let notes = [];
let unsubscribe = null;
let currentView = 'home';
let activeNote = null;
let editState = {};
let searchQuery = '';
let activeTag = null;
let activeFolder = null;
let previewMode = false;
let graphAnimId = null;
let graphNodes = [];
let isSyncing = false;
let editImages = []; // base64 images
let editChecklist = []; // [{text, done}]

// ─── Auth ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    subscribeNotes();
    render();
  } else {
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    notes = [];
    render();
  }
});

async function loginGoogle() {
  try {
    showToast('Menghubungkan...', 'info');
    await signInWithPopup(auth, provider);
  } catch(e) {
    showToast('Login gagal: ' + e.message, 'error');
  }
}

async function logout() {
  if (!confirm('Keluar dari akun?')) return;
  await signOut(auth);
  showToast('Berhasil keluar');
}

// ─── Firestore Sync ───────────────────────────────────────────────────────────
function subscribeNotes() {
  if (!currentUser) return;
  if (unsubscribe) unsubscribe();
  isSyncing = true;
  const q = query(collection(db, 'notes'), where('uid', '==', currentUser.uid));
  unsubscribe = onSnapshot(q, (snap) => {
    notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    isSyncing = false;
    // Update activeNote if open
    if (activeNote) activeNote = notes.find(n => n.id === activeNote.id) || activeNote;
    render();
  }, (err) => {
    isSyncing = false;
    showToast('Sync error: ' + err.message, 'error');
  });
}

async function saveNoteToFirestore(note) {
  if (!currentUser) return;
  isSyncing = true; render();
  try {
    await setDoc(doc(db, 'notes', note.id), { ...note, uid: currentUser.uid, updatedAt: serverTimestamp() });
    showToast('Tersimpan & tersinkron ✓');
  } catch(e) {
    showToast('Gagal simpan: ' + e.message, 'error');
  }
  isSyncing = false;
}

async function deleteNoteFromFirestore(id) {
  if (!currentUser) return;
  try {
    await deleteDoc(doc(db, 'notes', id));
    showToast('Catatan dihapus', 'error');
  } catch(e) {
    showToast('Gagal hapus', 'error');
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (type ? ' '+type : '');
  setTimeout(() => t.className = '', 2500);
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date(), diff = (now - d) / 1000;
  if (diff < 60) return 'Baru saja';
  if (diff < 3600) return Math.floor(diff/60) + ' mnt lalu';
  if (diff < 86400) return Math.floor(diff/3600) + ' jam lalu';
  return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'});
}

function renderMarkdown(text, checklist=[]) {
  if (!text) return '';
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\[\[(.+?)\]\]/g,'<span class="backlink" data-link="$1">◈ $1</span>')
    .replace(/\n/g,'<br>');

  // Add checklist
  if (checklist && checklist.length > 0) {
    html += '<div style="margin-top:16px">';
    checklist.forEach((item, i) => {
      html += `<div class="check-item ${item.done?'done':''}">
        <input type="checkbox" ${item.done?'checked':''} onchange="toggleCheck(${i})"/>
        <span>${item.text}</span>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function extractLinks(content) {
  return [...(content||'').matchAll(/\[\[(.+?)\]\]/g)].map(m=>m[1]);
}
function getAllTags() {
  const t={};notes.forEach(n=>(n.tags||[]).forEach(tag=>t[tag]=(t[tag]||0)+1));return t;
}
function getAllFolders() {
  const f={};notes.forEach(n=>{if(n.folder)f[n.folder]=(f[n.folder]||0)+1;});return f;
}
function getFilteredNotes() {
  let list=[...notes];
  if(activeTag) list=list.filter(n=>(n.tags||[]).includes(activeTag));
  if(activeFolder) list=list.filter(n=>n.folder===activeFolder);
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(n=>n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||(n.tags||[]).some(t=>t.includes(q)));}
  return list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.updated||0)-(a.updated||0));
}

// ─── Image handling ───────────────────────────────────────────────────────────
function handleImageUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    if (file.size > 500000) { showToast('Gambar max 500KB', 'error'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      editImages.push(ev.target.result);
      render();
    };
    reader.readAsDataURL(file);
  });
}

window.removeImage = (i) => { editImages.splice(i,1); render(); };

// ─── Checklist ────────────────────────────────────────────────────────────────
window.toggleCheck = (i) => {
  if (!activeNote) return;
  const cl = [...(activeNote.checklist||[])];
  cl[i] = {...cl[i], done: !cl[i].done};
  activeNote = {...activeNote, checklist: cl};
  saveNoteToFirestore({...activeNote, updated: Date.now()});
};

window.addCheckItem = () => {
  const input = document.getElementById('new-check-input');
  if (!input || !input.value.trim()) return;
  editChecklist.push({text: input.value.trim(), done: false});
  input.value = '';
  render();
  setTimeout(()=>{ const el=document.getElementById('new-check-input'); if(el) el.focus(); },50);
};

window.removeCheckItem = (i) => { editChecklist.splice(i,1); render(); };
window.toggleEditCheck = (i) => { editChecklist[i].done = !editChecklist[i].done; render(); };

// ─── Actions ──────────────────────────────────────────────────────────────────
window.loginGoogle = loginGoogle;
window.logout = logout;

window.openNote = (id) => {
  if(graphAnimId){cancelAnimationFrame(graphAnimId);graphAnimId=null;}
  activeNote = notes.find(n=>n.id===id);
  currentView='note'; render();
};

window.newNote = () => {
  activeNote=null;
  editState={title:'Catatan Baru',content:'# Catatan Baru\n\n',tags:'',folder:''};
  editImages=[]; editChecklist=[]; previewMode=false; currentView='edit'; render();
};

window.newJournal = () => {
  const today=new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  activeNote=null;
  editState={title:`Jurnal — ${today}`,content:`# Jurnal ${today}\n\n## 🌤 Bagaimana hariku?\n\n## 🙏 Yang aku syukuri\n- \n\n## 📋 Rencana besok\n- \n\n## 💭 Catatan bebas\n`,tags:'jurnal,harian',folder:'Jurnal'};
  editImages=[]; editChecklist=[]; previewMode=false; currentView='edit'; render();
};

window.editNote = (id) => {
  const note = notes.find(n=>n.id===id);
  if(!note) return;
  activeNote=note;
  editState={title:note.title,content:note.content,tags:(note.tags||[]).join(','),folder:note.folder||''};
  editImages=[...(note.images||[])];
  editChecklist=[...(note.checklist||[]).map(c=>({...c}))];
  previewMode=false; currentView='edit'; render();
};

window.saveNote = async () => {
  const tags=editState.tags.split(',').map(t=>t.trim()).filter(Boolean);
  const links=extractLinks(editState.content);
  const note = {
    id: activeNote ? activeNote.id : Date.now().toString(),
    title: editState.title, content: editState.content,
    tags, folder: editState.folder,
    pinned: activeNote ? activeNote.pinned : false,
    images: editImages,
    checklist: editChecklist,
    links, updated: Date.now(),
    created: activeNote ? activeNote.created : Date.now()
  };
  await saveNoteToFirestore(note);
  currentView='home'; render();
};

window.deleteNote = async (id) => {
  if(!confirm('Hapus catatan ini?')) return;
  await deleteNoteFromFirestore(id);
  currentView='home'; activeNote=null; render();
};

window.togglePin = async (id) => {
  const note=notes.find(n=>n.id===id);
  if(!note) return;
  await saveNoteToFirestore({...note, pinned:!note.pinned});
};

window.setView = (v) => { currentView=v; render(); };
window.setActiveTag = (t) => { activeTag=t; activeFolder=null; currentView='home'; render(); };
window.setActiveFolder = (f) => { activeFolder=f; activeTag=null; currentView='home'; render(); };
window.clearFilter = () => { activeTag=null; activeFolder=null; searchQuery=''; render(); };
window.togglePreview = () => { previewMode=!previewMode; render(); };
window.goBack = () => {
  if(currentView==='edit') currentView=activeNote?'note':'home';
  else if(currentView==='note') {currentView='home'; activeNote=null;}
  else currentView='home';
  render();
};

window.insertMarkdown = (pre,suf='') => {
  const ta=document.getElementById('note-textarea'); if(!ta) return;
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.slice(s,e);
  const nv=ta.value.slice(0,s)+pre+sel+suf+ta.value.slice(e);
  editState.content=nv; ta.value=nv; ta.focus(); ta.setSelectionRange(s+pre.length,e+pre.length);
};

window.handleImageUpload = handleImageUpload;

window.exportNotes = () => {
  const blob=new Blob([JSON.stringify(notes,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`notemind_${Date.now()}.json`; a.click(); showToast('Ekspor berhasil ✓');
};

// ─── Graph ────────────────────────────────────────────────────────────────────
function initGraph() {
  const canvas=document.getElementById('graph-canvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const DPR=window.devicePixelRatio||1;
  const W=canvas.clientWidth*DPR, H=canvas.clientHeight*DPR;
  canvas.width=W; canvas.height=H;
  graphNodes=notes.map((n,i)=>({
    id:n.id,title:n.title,
    x:(W/DPR)/2+Math.cos(i/notes.length*Math.PI*2)*110,
    y:(H/DPR)/2+Math.sin(i/notes.length*Math.PI*2)*110,
    vx:0,vy:0,links:n.links||[]
  }));
  if(graphAnimId) cancelAnimationFrame(graphAnimId);
  function draw() {
    const ns=graphNodes, cw=W/DPR, ch=H/DPR;
    for(let i=0;i<ns.length;i++){
      for(let j=i+1;j<ns.length;j++){
        const dx=ns[j].x-ns[i].x,dy=ns[j].y-ns[i].y,d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=900/(d*d);
        ns[i].vx-=dx/d*f;ns[i].vy-=dy/d*f;ns[j].vx+=dx/d*f;ns[j].vy+=dy/d*f;
      }
      ns[i].links.forEach(lname=>{
        const t=ns.find(n=>n.title===lname);if(!t)return;
        const dx=t.x-ns[i].x,dy=t.y-ns[i].y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-100)*0.04;
        ns[i].vx+=dx/d*f;ns[i].vy+=dy/d*f;t.vx-=dx/d*f;t.vy-=dy/d*f;
      });
      ns[i].vx+=(cw/2-ns[i].x)*0.006;ns[i].vy+=(ch/2-ns[i].y)*0.006;
      ns[i].vx*=0.82;ns[i].vy*=0.82;
      ns[i].x=Math.max(28,Math.min(cw-28,ns[i].x+ns[i].vx));
      ns[i].y=Math.max(28,Math.min(ch-28,ns[i].y+ns[i].vy));
    }
    ctx.save();ctx.scale(DPR,DPR);
    ctx.clearRect(0,0,cw,ch);ctx.fillStyle='#f3efe6';ctx.fillRect(0,0,cw,ch);
    ns.forEach(n=>{n.links.forEach(lname=>{
      const t=ns.find(x=>x.title===lname);if(!t)return;
      ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(t.x,t.y);
      ctx.strokeStyle='#c8b89a';ctx.lineWidth=1.5;ctx.stroke();
    });});
    ns.forEach(n=>{
      ctx.beginPath();ctx.arc(n.x,n.y,16,0,Math.PI*2);
      ctx.fillStyle='#5a7c5a';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle='#3d2b1f';ctx.font=`10px 'JetBrains Mono',monospace`;ctx.textAlign='center';
      const label=n.title.length>11?n.title.slice(0,11)+'…':n.title;
      ctx.fillText(label,n.x,n.y+28);
    });
    ctx.restore();
    graphAnimId=requestAnimationFrame(draw);
  }
  graphAnimId=requestAnimationFrame(draw);
  canvas.onclick=e=>{
    const rect=canvas.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top;
    const hit=graphNodes.find(n=>Math.hypot(n.x-x,n.y-y)<20);
    if(hit) window.openNote(hit.id);
  };
}

// ─── Note Card ────────────────────────────────────────────────────────────────
function noteCard(note) {
  const preview=(note.content||'').replace(/[#*`\[\]>]/g,'').slice(0,70)+'...';
  const firstImg=(note.images||[])[0];
  const checkDone=(note.checklist||[]).filter(c=>c.done).length;
  const checkTotal=(note.checklist||[]).length;
  return `<div class="card ${note.pinned?'pinned':''} fade-in" onclick="openNote('${note.id}')">
    ${note.pinned?`<div class="pin-badge">${ic.pinFill}</div>`:''}
    ${firstImg?`<img class="card-img" src="${firstImg}" alt=""/>`:'' }
    <div class="card-title">${note.title}</div>
    <div class="card-preview">${preview}</div>
    <div class="card-meta">
      ${note.folder?`<span class="folder-chip">${note.folder}</span>`:''}
      ${(note.tags||[]).slice(0,2).map(t=>`<span class="tag">#${t}</span>`).join('')}
      ${checkTotal>0?`<span class="tag" style="background:var(--green2);color:var(--green)">✓ ${checkDone}/${checkTotal}</span>`:''}
      <span class="date-text">${formatDate(note.updatedAt||note.updated)}</span>
    </div>
  </div>`;
}

function buildNavBar() {
  const items=[
    {icon:'note',label:'Catatan',v:'home'},
    {icon:'tag',label:'Tags',v:'tags'},
    {icon:'folder',label:'Folder',v:'folders'},
    {icon:'graph',label:'Graph',v:'graph'},
    {icon:'journal',label:'Jurnal',v:'journal'},
  ];
  return `<div class="nav-bar">${items.map(item=>`
    <button class="nav-item ${currentView===item.v?'active':''}"
      onclick="${item.v==='graph'?`cancelAnimationFrame(graphAnimId);currentView='graph';render()`
               :item.v==='journal'?'newJournal()'
               :`setView('${item.v}')`}">
      ${ic[item.icon]}<span>${item.label}</span>
    </button>`).join('')}</div>`;
}

function render() {
  if (!currentUser) {
    document.getElementById('app').innerHTML = buildLogin();
    return;
  }
  document.getElementById('app').innerHTML = buildMain();
  bindEvents();
  if(currentView==='graph') setTimeout(initGraph,50);
}

            ?`<div class="card" style="padding:11px 14px" onclick="openNote('${found.id}')">
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="color:var(--green)">${ic.link}</span>
                  <div><div style="font-size:14px;font-weight:600">${lname}</div></div>
                </div>
              </div>`
            :`<div class="card" style="padding:11px 14px;opacity:0.5"><span style="font-size:13px;color:var(--text3);font-family:var(--mono)">[[${lname}]] — belum dibuat</span></div>`;
        }).join('')}`:''}
      </div>
    </div>`;
  }

  // GRAPH
  if(currentView==='graph') return `<div class="view">
    <div class="header">
      <div class="logo"><span class="logo-mark">◈</span> Graph View</div>
      <button class="btn-outline btn-sm" onclick="cancelAnimationFrame(graphAnimId);setView('home')">${ic.close}</button>
    </div>
    <div class="scroll-area">
      <div class="section-title">Ketuk node untuk buka catatan</div>
      <canvas id="graph-canvas"></canvas>
    </div>
  </div>`;

  // TAGS
  if(currentView==='tags') {
    const tags=getAllTags();
    return `<div class="view">
      <div class="header"><div class="logo"><span class="logo-mark">◈</span> Tags</div><button class="btn-outline btn-sm" onclick="setView('home')">${ic.back}</button></div>
      <div class="scroll-area">
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${Object.entries(tags).map(([tag,count])=>`
          <button class="btn-outline" style="font-size:13px;padding:9px 14px;border-radius:20px" onclick="setActiveTag('${tag}')">
            #${tag} <span style="color:var(--text3)">(${count})</span>
          </button>`).join('')}
        </div>
        ${Object.keys(tags).length===0?`<div class="empty-state"><div class="emoji">🏷️</div><h3>Belum ada tag</h3></div>`:''}
      </div>
      ${buildNavBar()}
    </div>`;
  }

  // FOLDERS
  if(currentView==='folders') {
    const folders=getAllFolders();
    return `<div class="view">
      <div class="header"><div class="logo"><span class="logo-mark">◈</span> Folder</div><button class="btn-outline btn-sm" onclick="setView('home')">${ic.back}</button></div>
      <div class="scroll-area">
        ${Object.entries(folders).map(([folder,count])=>`
        <div class="card fade-in" onclick="setActiveFolder('${folder}')">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="color:var(--green)">${ic.folder}</div>
            <div><div class="card-title">${folder}</div><div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${count} catatan</div></div>
          </div>
        </div>`).join('')}
        ${Object.keys(folders).length===0?`<div class="empty-state"><div class="emoji">📁</div><h3>Belum ada folder</h3></div>`:''}
      </div>
      ${buildNavBar()}
    </div>`;
  }

  // HOME
  const filtered=getFilteredNotes();
  const pinned=filtered.filter(n=>n.pinned);
  const recent=filtered.filter(n=>!n.pinned);
  const tags=getAllTags();
  const syncDot=`<span class="sync-dot ${isSyncing?'syncing':''}" title="${isSyncing?'Menyinkron...':'Tersinkron'}"></span>`;

  return `<div class="view">
    <div class="header">
      <div class="logo"><span class="logo-mark">◈</span>Note<span class="logo-mark">Mind</span>${syncDot}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <img src="${currentUser.photoURL||''}" style="width:28px;height:28px;border-radius:50%;cursor:pointer" onclick="logout()" title="Keluar (${currentUser.displayName})"/>
        <button class="btn-outline btn-sm" onclick="exportNotes()" title="Ekspor">${ic.download}</button>
      </div>
    </div>
    <div class="scroll-area">
      <div class="search-wrap">
        <div class="search-icon">${ic.search}</div>
        <input class="input search-input" id="search-input" placeholder="Cari catatan, tag, isi..." value="${searchQuery}" oninput="searchQuery=this.value;activeTag=null;activeFolder=null;render()"/>
      </div>
      ${!searchQuery&&!activeTag&&!activeFolder?`
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-num">${notes.length}</div><div class="stat-label">Catatan</div></div>
        <div class="stat-item"><div class="stat-num">${Object.keys(tags).length}</div><div class="stat-label">Tags</div></div>
        <div class="stat-item"><div class="stat-num">${Object.keys(getAllFolders()).length}</div><div class="stat-label">Folder</div></div>
        <div class="stat-item"><div class="stat-num">${notes.filter(n=>n.pinned).length}</div><div class="stat-label">Pinned</div></div>
      </div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="newJournal()">📔 Jurnal</button>
        <button class="quick-btn" onclick="cancelAnimationFrame(graphAnimId);currentView='graph';render()">📊 Graph</button>
        <button class="quick-btn" onclick="setView('tags')">🏷️ Tags</button>
        <button class="quick-btn" onclick="setView('folders')">📁 Folder</button>
      </div>`:`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <button class="btn-outline btn-sm" onclick="clearFilter()">${ic.close} Reset</button>
        ${activeTag?`<span class="tag">#${activeTag}</span>`:''}
        ${activeFolder?`<span class="folder-chip">📁 ${activeFolder}</span>`:''}
      </div>`}
      ${pinned.length>0?`<div class="section-title">📌 Disematkan</div>${pinned.map(noteCard).join('')}`:''}
      <div class="section-title">${searchQuery||activeTag||activeFolder?`Hasil (${filtered.length})`:'📝 Terbaru'}</div>
      ${recent.length===0&&pinned.length===0?`
      <div class="empty-state slide-up">
        <div class="emoji">🌿</div>
        <h3>Belum ada catatan</h3>
        <p>Tekan + untuk mulai menulis</p>
      </div>`
      :recent.map(noteCard).join('')}
    </div>
    <button class="fab" onclick="newNote()">${ic.plus}</button>
    ${buildNavBar()}
  </div>`;
}

function bindEvents() {
  const titleEl=document.getElementById('edit-title');
  if(titleEl) titleEl.oninput=e=>editState.title=e.target.value;
  const folderEl=document.getElementById('edit-folder');
  if(folderEl) folderEl.oninput=e=>editState.folder=e.target.value;
  const tagsEl=document.getElementById('edit-tags');
  if(tagsEl) tagsEl.oninput=e=>editState.tags=e.target.value;
  const taEl=document.getElementById('note-textarea');
  if(taEl) taEl.oninput=e=>editState.content=e.target.value;
  const nc=document.getElementById('note-content');
  if(nc) nc.onclick=e=>{
    const link=e.target.closest('[data-link]');
    if(link){const found=notes.find(n=>n.title===link.dataset.link);if(found)window.openNote(found.id);}
  };
}

window.render = render;

</script>
</body>
</html>
