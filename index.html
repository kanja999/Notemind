<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#3d2b1f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="NoteMind"/>
<title>NoteMind</title>
<style>
:root{--bg:#faf8f3;--bg2:#f3efe6;--white:#fff;--border:#e8e0d0;--text:#3d2b1f;--text2:#7a6a5a;--text3:#b0a090;--green:#5a7c5a;--green2:#e8f0e8;--accent:#3d2b1f;--red:#c0392b;--radius:14px;--rsm:8px;--shadow:0 2px 12px rgba(61,43,31,0.08);--shadow-lg:0 8px 32px rgba(61,43,31,0.15);--font:'Georgia',serif;--mono:monospace;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;}
#app{display:flex;flex-direction:column;min-height:100dvh;}
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:calc(12px + var(--st)) 20px 12px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.logo{font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.lm{color:var(--green);}
.scroll{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(100px + var(--sb));}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:#e0d8c8;border-radius:2px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,0.96);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(10px + var(--sb));z-index:40;backdrop-filter:blur(16px);}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:10px;font-family:var(--mono);cursor:pointer;padding:6px 10px;border-radius:10px;border:none;background:none;transition:color 0.2s;}
.ni.act{color:var(--green);}
.fab{position:fixed;bottom:calc(70px + var(--sb));right:calc(50% - 210px);width:52px;height:52px;border-radius:26px;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-lg);z-index:45;}
.fab:active{transform:scale(0.92);}
/* Grid cards */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;position:relative;box-shadow:var(--shadow);display:flex;flex-direction:column;}
.card:active{transform:scale(0.97);}
.card.pin{border-color:var(--green);background:#f9fcf9;}
.ct{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cp{font-size:11px;color:var(--text3);line-height:1.5;font-family:var(--mono);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.cm{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:8px;}
.ci{width:100%;height:75px;object-fit:cover;border-radius:8px;margin-bottom:8px;cursor:pointer;}
.pb{position:absolute;top:8px;right:8px;color:var(--green);}
.tag{background:var(--bg2);color:var(--text2);font-size:10px;padding:2px 7px;border-radius:20px;font-family:var(--mono);}
.fc{background:var(--green2);color:var(--green);font-size:10px;padding:2px 7px;border-radius:20px;font-family:var(--mono);}
.dt{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:auto;}
.st{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 10px;font-family:var(--mono);}
/* Buttons */
.btn{background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);padding:9px 16px;font-size:13px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;font-weight:600;}
.btn:active{transform:scale(0.96);}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 14px;font-size:13px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;}
.btn-o:active{transform:scale(0.96);background:var(--bg2);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-g{background:var(--green);}
.btn-r{color:var(--red);border-color:#f5c6c3;}
/* Inputs */
.inp{width:100%;border:1px solid var(--border);border-radius:var(--rsm);padding:11px 13px;font-size:14px;font-family:var(--font);background:var(--white);color:var(--text);outline:none;}
.inp:focus{border-color:var(--green);}
.inp-t{font-size:19px;font-weight:700;border:none;border-bottom:2px solid var(--border);border-radius:0;padding:8px 0;}
.inp-t:focus{border-color:var(--green);}
.ta{width:100%;border:1px solid var(--border);border-radius:var(--rsm);padding:13px;font-size:13px;font-family:var(--mono);background:var(--white);color:var(--text);outline:none;resize:none;line-height:1.8;min-height:260px;}
.ta:focus{border-color:var(--green);}
/* Search */
.sw{position:relative;margin-bottom:14px;}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);}
.si-p{padding-left:38px!important;}
/* Stats */
.sb{display:flex;gap:10px;overflow-x:auto;margin-bottom:16px;}
.sb::-webkit-scrollbar{display:none;}
.si2{flex-shrink:0;background:var(--white);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 14px;text-align:center;min-width:72px;}
.sn{font-size:18px;font-weight:700;color:var(--green);font-family:var(--mono);}
.sl{font-size:10px;color:var(--text3);font-family:var(--mono);}
/* Quick btns */
.qa{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;}
.qa::-webkit-scrollbar{display:none;}
.qb{white-space:nowrap;font-size:12px;padding:8px 13px;background:var(--white);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-family:var(--mono);color:var(--text);flex-shrink:0;}
.qb:active{background:var(--bg2);}
/* Markdown */
.md{font-family:var(--font);font-size:15px;line-height:1.85;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.md h1{font-size:1.4em;margin:14px 0 7px;padding-bottom:5px;border-bottom:2px solid var(--border);}
.md h2{font-size:1.2em;margin:12px 0 5px;}
.md h3{font-size:1.05em;margin:9px 0 4px;}
.md code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:0.88em;font-family:var(--mono);color:var(--green);}
.md ul,.md ol{padding-left:18px;margin:7px 0;}
.md li{margin:3px 0;}
.md blockquote{border-left:3px solid var(--green);padding-left:12px;color:var(--text2);font-style:italic;margin:9px 0;}
.md img{max-width:100%;border-radius:8px;margin:7px 0;cursor:pointer;}
.bl{color:var(--green);cursor:pointer;font-weight:600;border-bottom:1px dashed #c8ddc8;}
/* Checklist */
.cli{display:flex;align-items:flex-start;gap:9px;margin:5px 0;padding:8px 10px;background:var(--bg2);border-radius:8px;}
.cli input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--green);flex-shrink:0;margin-top:2px;}
.cli.done span{text-decoration:line-through;color:var(--text3);}
.cli span{font-size:14px;line-height:1.5;}
.cle{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.cle input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);flex-shrink:0;}
.cle input[type=text]{flex:1;border:none;border-bottom:1px solid var(--border);background:transparent;padding:4px 0;font-family:var(--font);font-size:13px;color:var(--text);outline:none;}
/* Toolbar */
.tb{display:flex;gap:5px;overflow-x:auto;padding:7px 0;border-bottom:1px solid var(--border);margin-bottom:9px;}
.tb::-webkit-scrollbar{display:none;}
.tbt{flex-shrink:0;background:var(--bg2);border:none;border-radius:5px;padding:5px 9px;font-size:12px;font-family:var(--mono);cursor:pointer;color:var(--text2);}
.tbt:active{background:var(--green2);color:var(--green);}
/* Image upload */
.iu{border:2px dashed #d8cfc0;border-radius:var(--rsm);padding:14px;cursor:pointer;margin-top:9px;background:var(--bg2);display:flex;align-items:center;gap:10px;}
.iu:active{border-color:var(--green);}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
.ip{position:relative;}
.ip img{width:100%;height:75px;object-fit:cover;border-radius:7px;cursor:pointer;}
.ip .di{position:absolute;top:3px;right:3px;background:rgba(192,57,43,0.85);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* Lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:999;align-items:center;justify-content:center;}
#lb.open{display:flex;}
#lb img{max-width:95vw;max-height:88dvh;object-fit:contain;border-radius:10px;}
#lb-x{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;}
/* Canvas */
#gc{width:100%;height:370px;border-radius:var(--radius);background:var(--bg2);touch-action:none;cursor:pointer;border:1px solid var(--border);user-select:none;}
/* Toast */
#toast{position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;font-family:var(--mono);opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{background:var(--red);}
#toast.inf{background:#2980b9;}
/* Empty */
.es{text-align:center;padding:50px 20px;color:var(--text3);}
.es .ej{font-size:44px;margin-bottom:12px;}
.es h3{font-size:16px;margin-bottom:7px;color:var(--text2);}
.es p{font-size:12px;font-family:var(--mono);}
/* Login */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 28px;text-align:center;background:var(--bg);}
.login-logo{font-size:56px;margin-bottom:16px;}
.login-title{font-size:26px;font-weight:700;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--text3);font-family:var(--mono);margin-bottom:36px;line-height:1.7;}
.login-btn{display:flex;align-items:center;gap:11px;background:var(--white);border:1px solid var(--border);border-radius:13px;padding:13px 22px;font-size:14px;font-family:var(--font);color:var(--text);cursor:pointer;box-shadow:var(--shadow);font-weight:600;}
.lf{margin-top:36px;text-align:left;width:100%;}
.lfi{display:flex;align-items:center;gap:10px;padding:9px 0;font-family:var(--mono);font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
.sync{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-left:5px;}
.sync.spin{background:var(--text3);animation:pulse 1s infinite;}
.divider{height:1px;background:var(--border);margin:14px 0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes fi{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi 0.22s ease-out;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="lb" onclick="closeLB()">
  <img id="lb-img" src="" alt=""/>
  <button id="lb-x" onclick="closeLB()">×</button>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {getFirestore,collection,doc,setDoc,deleteDoc,onSnapshot,query,where,serverTimestamp} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FC={
  apiKey:"AIzaSyAj6fs4QNc7G4M8i8Fz3CwkjpBdfPbegy8",
  authDomain:"noteminda.firebaseapp.com",
  projectId:"noteminda",
  storageBucket:"noteminda.firebasestorage.app",
  messagingSenderId:"705895134394",
  appId:"1:705895134394:web:6d966e73cf5f94fc9a7e83",
  measurementId:"G-EPTVBLY3RV"
};

const fa=initializeApp(FC);
const auth=getAuth(fa);
const db=getFirestore(fa);
const gp=new GoogleAuthProvider();

// State
let user=null,notes=[],unsub=null;
let view='home',activeNote=null,editState={},editImgs=[],editCL=[];
let searchQ='',activeTag=null,activeFolder=null,prevMode=false;
let gAnimId=null,gNodes=[],syncing=false;

// Auth
onAuthStateChanged(auth,u=>{
  user=u;
  if(u){subNotes();render();}
  else{if(unsub){unsub();unsub=null;}notes=[];render();}
});

window.doLogin=async()=>{
  try{showToast('Menghubungkan...','inf');await signInWithPopup(auth,gp);}
  catch(e){showToast('Login gagal','err');}
};

window.doLogout=async()=>{
  if(!confirm('Keluar dari akun?'))return;
  await signOut(auth);
};

function subNotes(){
  if(!user)return;
  if(unsub)unsub();
  syncing=true;
  const q=query(collection(db,'notes'),where('uid','==',user.uid));
  unsub=onSnapshot(q,snap=>{
    notes=snap.docs.map(d=>({id:d.id,...d.data()}));
    syncing=false;
    if(activeNote)activeNote=notes.find(n=>n.id===activeNote.id)||activeNote;
    render();
  },e=>{syncing=false;showToast('Sync error','err');});
}

async function saveFS(note){
  if(!user)return;
  syncing=true;render();
  try{
    await setDoc(doc(db,'notes',note.id),{...note,uid:user.uid,updatedAt:serverTimestamp()});
    showToast('Tersimpan ✓');
  }catch(e){showToast('Gagal simpan','err');}
  syncing=false;
}

async function delFS(id){
  if(!user)return;
  try{await deleteDoc(doc(db,'notes',id));showToast('Dihapus','err');}
  catch(e){showToast('Gagal hapus','err');}
}

// Helpers
function showToast(m,t=''){
  const el=document.getElementById('toast');
  el.textContent=m;el.className='show'+(t?' '+t:'');
  setTimeout(()=>el.className='',2500);
}

function fmtDate(ts){
  if(!ts)return'';
  const d=ts.toDate?ts.toDate():new Date(ts);
  const diff=(new Date()-d)/1000;
  if(diff<60)return'Baru saja';
  if(diff<3600)return Math.floor(diff/60)+' mnt lalu';
  if(diff<86400)return Math.floor(diff/3600)+' jam lalu';
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});
}

function renderMD(text,cl){
  if(!text)return'';
  let h=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\[\[(.+?)\]\]/g,'<span class="bl" data-link="$1">◈ $1</span>')
    .replace(/\n/g,'<br>');
  if(cl&&cl.length>0){
    h+='<div style="margin-top:14px">';
    cl.forEach((item,i)=>{
      h+='<div class="cli '+(item.done?'done':'')+'"><input type="checkbox" '+(item.done?'checked':'')+' onchange="toggleCK('+i+')"/><span>'+item.text+'</span></div>';
    });
    h+='</div>';
  }
  return h;
}

function getLinks(c){return[...(c||'').matchAll(/\[\[(.+?)\]\]/g)].map(m=>m[1]);}
function getTags(){const t={};notes.forEach(n=>(n.tags||[]).forEach(g=>t[g]=(t[g]||0)+1));return t;}
function getFolders(){const f={};notes.forEach(n=>{if(n.folder)f[n.folder]=(f[n.folder]||0)+1;});return f;}
function getFiltered(){
  let list=[...notes];
  if(activeTag)list=list.filter(n=>(n.tags||[]).includes(activeTag));
  if(activeFolder)list=list.filter(n=>n.folder===activeFolder);
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(n=>n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||(n.tags||[]).some(t=>t.includes(q)));}
  return list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.updated||0)-(a.updated||0));
}

// Lightbox
window.openLB=(src)=>{document.getElementById('lb-img').src=src;document.getElementById('lb').className='open';};
window.closeLB=()=>{document.getElementById('lb').className='';};

// Checklist
window.toggleCK=(i)=>{
  if(!activeNote)return;
  const cl=[...(activeNote.checklist||[])];
  cl[i]={...cl[i],done:!cl[i].done};
  activeNote={...activeNote,checklist:cl};
  saveFS({...activeNote,updated:Date.now()});
};
window.addCK=()=>{
  const inp=document.getElementById('nci');
  if(!inp||!inp.value.trim())return;
  editCL.push({text:inp.value.trim(),done:false});
  inp.value='';render();
  setTimeout(()=>{const e=document.getElementById('nci');if(e)e.focus();},50);
};
window.delCK=(i)=>{editCL.splice(i,1);render();};
window.togCK=(i)=>{editCL[i].done=!editCL[i].done;render();};

// Images
window.onImgChange=(e)=>{
  Array.from(e.target.files).forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    if(f.size>500000){showToast('Max 500KB/gambar','err');return;}
    const r=new FileReader();
    r.onload=ev=>{editImgs.push(ev.target.result);render();};
    r.readAsDataURL(f);
  });
};
window.delImg=(i)=>{editImgs.splice(i,1);render();};

// Actions
window.openNote=(id)=>{
  if(gAnimId){cancelAnimationFrame(gAnimId);gAnimId=null;}
  activeNote=notes.find(n=>n.id===id);
  view='note';render();
};
window.newNote=()=>{
  activeNote=null;
  editState={title:'Catatan Baru',content:'# Catatan Baru\n\n',tags:'',folder:''};
  editImgs=[];editCL=[];prevMode=false;view='edit';render();
};
window.newJournal=()=>{
  const d=new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  activeNote=null;
  editState={title:'Jurnal — '+d,content:'# Jurnal '+d+'\n\n## Bagaimana hariku?\n\n## Yang aku syukuri\n- \n\n## Rencana besok\n- \n',tags:'jurnal,harian',folder:'Jurnal'};
  editImgs=[];editCL=[];prevMode=false;view='edit';render();
};
window.editNote=(id)=>{
  const n=notes.find(x=>x.id===id);if(!n)return;
  activeNote=n;
  editState={title:n.title,content:n.content,tags:(n.tags||[]).join(','),folder:n.folder||''};
  editImgs=[...(n.images||[])];editCL=[...(n.checklist||[]).map(c=>({...c}))];
  prevMode=false;view='edit';render();
};
window.saveNote=async()=>{
  const tags=editState.tags.split(',').map(t=>t.trim()).filter(Boolean);
  const links=getLinks(editState.content);
  const n={
    id:activeNote?activeNote.id:Date.now().toString(),
    title:editState.title,content:editState.content,
    tags,folder:editState.folder,
    pinned:activeNote?activeNote.pinned:false,
    images:editImgs,checklist:editCL,links,
    updated:Date.now(),created:activeNote?activeNote.created:Date.now()
  };
  await saveFS(n);view='home';render();
};
window.delNote=async(id)=>{
  if(!confirm('Hapus catatan ini?'))return;
  await delFS(id);activeNote=null;view='home';render();
};
window.pinNote=async(id)=>{
  const n=notes.find(x=>x.id===id);if(!n)return;
  await saveFS({...n,pinned:!n.pinned});
};
window.setView=(v)=>{view=v;render();};
window.setTag=(t)=>{activeTag=t;activeFolder=null;view='home';render();};
window.setFolder=(f)=>{activeFolder=f;activeTag=null;view='home';render();};
window.clearFilter=()=>{activeTag=null;activeFolder=null;searchQ='';render();};
window.togPrev=()=>{prevMode=!prevMode;render();};
window.goBack=()=>{
  if(view==='edit')view=activeNote?'note':'home';
  else if(view==='note'){view='home';activeNote=null;}
  else view='home';
  render();
};
window.insMarker=(p,s)=>{
  const ta=document.getElementById('nota');if(!ta)return;
  const st=ta.selectionStart,en=ta.selectionEnd,sel=ta.value.slice(st,en);
  const nv=ta.value.slice(0,st)+p+sel+(s||'')+ta.value.slice(en);
  editState.content=nv;ta.value=nv;ta.focus();ta.setSelectionRange(st+p.length,en+p.length);
};
window.doExport=()=>{
  const b=new Blob([JSON.stringify(notes,null,2)],{type:'application/json'});

// Card builder
function mkCard(n){
  const prev=(n.content||'').replace(/<[^>]*>/g,'').replace(/[#*\[\]>]/g,'').slice(0,65)+'...';
  const fi=(n.images||[])[0];
  const cd=(n.checklist||[]).filter(c=>c.done).length;
  const ct=(n.checklist||[]).length;
  let h='<div class="card '+(n.pinned?'pin':'')+' fi" onclick="openNote(\''+n.id+'\')">';
  if(n.pinned) h+='<div class="pb">'+I.pinF+'</div>';
  if(fi) h+='<img class="ci" src="'+fi+'" alt="" onclick="event.stopPropagation();openLB(\''+fi+'\')">';
  h+='<div class="ct">'+n.title+'</div>';
  h+='<div class="cp">'+prev+'</div>';
  h+='<div class="cm">';
  if(n.folder) h+='<span class="fc">'+n.folder+'</span>';
  (n.tags||[]).slice(0,2).forEach(t=>{h+='<span class="tag">#'+t+'</span>';});
  if(ct>0) h+='<span class="tag" style="background:var(--green2);color:var(--green)">✓ '+cd+'/'+ct+'</span>';
  h+='<span class="dt">'+fmtDate(n.updatedAt||n.updated)+'</span>';
  h+='</div></div>';
  return h;
}

// Nav bar builder  
function mkNav(){
  const items=[
    {ico:I.note,lbl:'Catatan',v:'home'},
    {ico:I.tag,lbl:'Tags',v:'tags'},
    {ico:I.folder,lbl:'Folder',v:'folders'},
    {ico:I.graph,lbl:'Graph',v:'graph'},
    {ico:I.journal,lbl:'Jurnal',v:'_j'},
  ];
  let h='<div class="nav">';
  items.forEach(it=>{
    const act=(view===it.v)||(view==='home'&&it.v==='home');
    const onclick=it.v==='_j'?'newJournal()':it.v==='graph'?'cancelAnimationFrame(gAnimId);gAnimId=null;setView(\'graph\')':'setView(\''+it.v+'\')';
    h+='<button class="ni '+(act?'act':'')+'" onclick="'+onclick+'">'+it.ico+'<span>'+it.lbl+'</span></button>';
  });
  h+='</div>';
  return h;
}

// Graph
function initGraph(){
  const cv=document.getElementById('gc');if(!cv)return;
  const ctx=cv.getContext('2d');
  const DPR=window.devicePixelRatio||1;
  const rct=cv.getBoundingClientRect();
  const W=Math.round(rct.width*DPR)||340*DPR;
  const H=370*DPR;
  cv.width=W;cv.height=H;
  const lw=W/DPR,lh=H/DPR;

  gNodes=notes.map((n,i)=>({
    id:n.id,title:n.title,links:n.links||[],
    x:lw/2+Math.cos(i/notes.length*Math.PI*2)*110,
    y:lh/2+Math.sin(i/notes.length*Math.PI*2)*110,
    vx:0,vy:0
  }));

  if(gAnimId)cancelAnimationFrame(gAnimId);

  function draw(){
    const ns=gNodes;
    for(let i=0;i<ns.length;i++){
      for(let j=i+1;j<ns.length;j++){
        const dx=ns[j].x-ns[i].x,dy=ns[j].y-ns[i].y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=800/(d*d);
        ns[i].vx-=dx/d*f;ns[i].vy-=dy/d*f;
        ns[j].vx+=dx/d*f;ns[j].vy+=dy/d*f;
      }
      ns[i].links.forEach(ln=>{
        const t=ns.find(x=>x.title===ln);if(!t)return;
        const dx=t.x-ns[i].x,dy=t.y-ns[i].y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=(d-100)*0.04;
        ns[i].vx+=dx/d*f;ns[i].vy+=dy/d*f;
        t.vx-=dx/d*f;t.vy-=dy/d*f;
      });
      ns[i].vx+=(lw/2-ns[i].x)*0.006;ns[i].vy+=(lh/2-ns[i].y)*0.006;
      ns[i].vx*=0.82;ns[i].vy*=0.82;
      ns[i].x=Math.max(28,Math.min(lw-28,ns[i].x+ns[i].vx));
      ns[i].y=Math.max(28,Math.min(lh-28,ns[i].y+ns[i].vy));
    }
    ctx.save();ctx.scale(DPR,DPR);
    ctx.clearRect(0,0,lw,lh);
    ctx.fillStyle='#f3efe6';ctx.fillRect(0,0,lw,lh);
    // Edges
    ns.forEach(n=>{n.links.forEach(ln=>{
      const t=ns.find(x=>x.title===ln);if(!t)return;
      ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(t.x,t.y);
      ctx.strokeStyle='#c8b89a';ctx.lineWidth=1.5;ctx.stroke();
    });});
    // Nodes
    ns.forEach(n=>{
      ctx.beginPath();ctx.arc(n.x,n.y,17,0,Math.PI*2);
      ctx.fillStyle='#5a7c5a';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 11px Georgia';ctx.textAlign='center';
      ctx.fillText('◈',n.x,n.y+4);
      const lb=n.title.length>13?n.title.slice(0,13)+'…':n.title;
      const lw2=ctx.measureText(lb).width;
      ctx.fillStyle='rgba(250,248,243,0.88)';
      ctx.fillRect(n.x-lw2/2-3,n.y+20,lw2+6,13);
      ctx.fillStyle='#3d2b1f';ctx.font='10px monospace';
      ctx.fillText(lb,n.x,n.y+31);
    });
    ctx.restore();
    gAnimId=requestAnimationFrame(draw);
  }
  gAnimId=requestAnimationFrame(draw);

  // Tap handler - using logical coordinates
  function tapHandler(cx,cy){
    const rct2=cv.getBoundingClientRect();
    const scX=lw/rct2.width,scY=lh/rct2.height;
    const x=(cx-rct2.left)*scX,y=(cy-rct2.top)*scY;
    const hit=gNodes.find(n=>Math.hypot(n.x-x,n.y-y)<30);
    if(hit){cancelAnimationFrame(gAnimId);gAnimId=null;window.openNote(hit.id);}
  }
  cv.addEventListener('click',e=>tapHandler(e.clientX,e.clientY));
  cv.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
  cv.addEventListener('touchend',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    tapHandler(t.clientX,t.clientY);
  },{passive:false});
}

// Main render
function render(){
  const app=document.getElementById('app');
  if(!user){app.innerHTML=buildLogin();return;}

  if(view==='edit'){app.innerHTML=buildEdit();bindEdit();return;}
  if(view==='note'&&activeNote){app.innerHTML=buildNote();bindNote();return;}
  if(view==='graph'){app.innerHTML=buildGraph();setTimeout(initGraph,150);return;}
  if(view==='tags'){app.innerHTML=buildTags();return;}
  if(view==='folders'){app.innerHTML=buildFolders();return;}
  app.innerHTML=buildHome();bindHome();
}
window.render=render;

}

function buildHome(){
  const filtered=getFiltered();
  const pinned=filtered.filter(n=>n.pinned);
  const recent=filtered.filter(n=>!n.pinned);
  const tags=getTags();
  const folders=getFolders();
  const sc=syncing?'spin':'';

  let h='<div>'
    +'<div class="hdr">'
    +'<div class="logo"><span class="lm">◈</span>Note<span class="lm">Mind</span><span class="sync '+sc+'"></span></div>'
    +'<div style="display:flex;gap:7px;align-items:center">'
    +'<img src="'+(user.photoURL||'')+'" style="width:27px;height:27px;border-radius:50%;cursor:pointer" onclick="doLogout()" title="Keluar"/>'
    +'<button class="btn-o btn-sm" onclick="doExport()">'+I.dl+'</button>'
    +'</div></div>'
    +'<div class="scroll">'
    +'<div class="sw"><span class="si">'+I.note+'</span>'
    +'<input class="inp si-p" id="srch" placeholder="Cari catatan, tag, isi..." value="'+searchQ+'" oninput="searchQ=this.value;activeTag=null;activeFolder=null;render()"/>'
    +'</div>';

  if(!searchQ&&!activeTag&&!activeFolder){
    // Stats
    h+='<div class="sb">'
      +'<div class="si2"><div class="sn">'+notes.length+'</div><div class="sl">Catatan</div></div>'
      +'<div class="si2"><div class="sn">'+Object.keys(tags).length+'</div><div class="sl">Tags</div></div>'
      +'<div class="si2"><div class="sn">'+Object.keys(folders).length+'</div><div class="sl">Folder</div></div>'
      +'<div class="si2"><div class="sn">'+notes.filter(n=>n.pinned).length+'</div><div class="sl">Pinned</div></div>'
      +'</div>';
    // Quick actions
    h+='<div class="qa">'
      +'<button class="qb" onclick="newJournal()">📔 Jurnal</button>'
      +'<button class="qb" onclick="cancelAnimationFrame(gAnimId);gAnimId=null;setView(\'graph\')">📊 Graph</button>'
      +'<button class="qb" onclick="setView(\'tags\')">🏷️ Tags</button>'
      +'<button class="qb" onclick="setView(\'folders\')">📁 Folder</button>'
      +'</div>';
  } else {
    h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:13px">'
      +'<button class="btn-o btn-sm" onclick="clearFilter()">'+I.x+' Reset</button>'
      +(activeTag?'<span class="tag">#'+activeTag+'</span>':'')
      +(activeFolder?'<span class="fc">📁 '+activeFolder+'</span>':'')
      +'</div>';
  }

  // Pinned
  if(pinned.length>0){
    h+='<div class="st">📌 DISEMATKAN</div><div class="grid">';
    pinned.forEach(n=>{h+=mkCard(n);});
    h+='</div>';
  }

  // Recent
  const lbl=searchQ||activeTag||activeFolder?'HASIL ('+filtered.length+')':'📝 TERBARU';
  h+='<div class="st">'+lbl+'</div>';

  if(recent.length===0&&pinned.length===0){
    h+='<div class="es"><div class="ej">🌿</div><h3>Belum ada catatan</h3><p>Tekan + untuk mulai menulis</p></div>';
  } else {
    h+='<div class="grid">';
    recent.forEach(n=>{h+=mkCard(n);});
    h+='</div>';
  }

  h+='</div>'
    +'<button class="fab" onclick="newNote()">'+I.plus+'</button>'
    +mkNav()+'</div>';
  return h;
}

function bindEdit(){
  const et=document.getElementById('et');if(et)et.oninput=e=>editState.title=e.target.value;
  const ef=document.getElementById('ef');if(ef)ef.oninput=e=>editState.folder=e.target.value;
  const eg=document.getElementById('eg');if(eg)eg.oninput=e=>editState.tags=e.target.value;
  const ta=document.getElementById('nota');if(ta)ta.oninput=e=>editState.content=e.target.value;
}
function bindNote(){
  const nc=document.getElementById('nc');
  if(nc)nc.onclick=e=>{
    const bl=e.target.closest('[data-link]');
    if(bl){const f=notes.find(n=>n.title===bl.dataset.link);if(f)window.openNote(f.id);}
  };
}

  // search focus restore
}
</script>
